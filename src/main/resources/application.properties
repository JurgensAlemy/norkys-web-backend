# Norky's Backend - Configuracion de base de datos

# ====== BASE DE DATOS ======
# Local: si no defines las variables de entorno, usa estos valores por defecto
#        (los que ya tenías: localhost:5434, postgres/root)
# Railway: define SPRING_DATASOURCE_URL / USERNAME / PASSWORD en la pestaña
#          "Variables" del servicio y estas líneas las toman automáticamente.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/norkys_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== JPA / HIBERNATE ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ====== SERVIDOR ======
# Railway asigna su propio puerto en la variable PORT; en local usa 8080
server.port=${PORT:8080}

# ====== NOMBRE APP ======
spring.application.name=norkys-backend